services:
  postgres:
    image: postgres:16-alpine
    container_name: coworking-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: coworking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
